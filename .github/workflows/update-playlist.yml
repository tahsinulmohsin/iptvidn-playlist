name: 🔄 Update M3U8 Playlist

on:
  schedule:
    - cron: '*/20 * * * *'  # Every 20 minutes
  workflow_dispatch:         # Manual trigger
  push:
    branches: [main]
    paths: ['scraper/**']    # Re-run if scraper code changes

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔧 Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libasound2 libxshmfence1

      - name: 🕷️ Run scraper
        run: npm run scrape
        env:
          PUPPETEER_EXECUTABLE_PATH: ''

      - name: ✅ Validate playlist
        run: npm test

      - name: 📤 Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/playlist.m3u8
          if git diff --staged --quiet; then
            echo "📋 No changes detected. Playlist is up to date."
          else
            CHANNEL_COUNT=$(grep -c "#EXTINF" public/playlist.m3u8 || echo "0")
            git commit -m "🔄 Update playlist — ${CHANNEL_COUNT} channels — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Playlist updated and pushed!"
          fi
